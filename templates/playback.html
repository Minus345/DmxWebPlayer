{% extends "base.html" %}
{% set title = "Playback" %}
{% set active = "playback" %}

{% block content %}
    <style>
        .scene-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .scene-button {
            width: 100%;
            aspect-ratio: 1; /* macht es quadratisch */
            background: #2a2a2a;
            border: 2px solid #444;
            border-radius: 10px;
            color: #e5e5e5;
            font-size: 1.2rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            transition: 0.15s;
        }

        .scene-button:hover {
            background: #3a3a3a;
            border-color: #666;
        }

        .scene-button:active {
            background: #555;
        }

        .stop-button {
            width: 100%;
            padding: 20px;
            font-size: 1.3rem;
            font-weight: bold;
            background: #7a0000;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.15s;
        }

        .stop-button:hover {
            background: #a00000;
        }
    </style>

    <div class="scene-grid">
        {% for (id, name) in sceneList %}
            <form action="/playback" method="POST">
                <button class="scene-button" type="submit" name="start" value="{{ id }}">
                    {{ name }}
                </button>
            </form>
        {% endfor %}
    </div>

    <form action="/playback" method="POST">
        <button class="stop-button" type="submit" name="stop" value="stop">STOP</button>
    </form>

    <p style="margin-top: 30px">Log:</p>
    {{ log }}

{% endblock %}
