{% extends "base.html" %}
{% set title = "Playback" %}
{% set active = "playback" %}

{% block content %}
    <style>
        table, th, td {
            border: 1px solid black;
            border-collapse: collapse;
        }
    </style>

    <table>
        <tr>
            <th>Scene ID</th>
            <th>Scene Name</th>
            <th>Action</th>
        </tr>
        {% for (id,name) in sceneList %}
            <tr>
                <td>{{ id }}</td>
                <td>{{ name }}</td>
                <td>
                    <form action="/playback" method="POST">
                        <button type="submit" name="start" value="{{ id }}">Start</button>
                    </form>
                </td>
            </tr>
        {% endfor %}
    </table>

    <form action="/playback" method="POST">
        <button type="submit" name="stop" value="stop">Stop</button>
    </form>
{% endblock %}
