{% extends "base.html" %}
{% set title = "Playback" %}
{% set active = "playback" %}

{% block content %}
    <style>
        .scene-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .scene-button {
            width: 100%;
            aspect-ratio: 1; /* macht es quadratisch */
            background: #2a2a2a;
            border: 2px solid #444;
            border-radius: 10px;
            color: #e5e5e5;
            font-size: 1.2rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            transition: 0.15s;
        }

        .scene-button-active {
            width: 100%;
            aspect-ratio: 1; /* macht es quadratisch */
            background: #2a2a2a;
            border: 2px solid var(--lila);
            border-radius: 10px;
            color: #e5e5e5;
            font-size: 1.2rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            transition: 0.15s;
        }

        .scene-button:hover {
            background: #3a3a3a;
            border-color: #666;
        }

        .scene-button:active {
            background: #555;
        }

        .stop-button {
            width: 100%;
            padding: 20px;
            font-size: 1.3rem;
            font-weight: bold;
            background: #7a0000;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.15s;
        }

        .stop-button:hover {
            background: #a00000;
        }

        .fixed-stop-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            z-index: 9999;
        }

        .fixed-stop-container .stop-button {
            width: 100%;
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"
            integrity="sha512-q/dWJ3kcmjBLU4Qc47E4A9kTB4m3wuTY7vkFJDTZKjTs8jhyGQnaUrxa0Ytd0ssMZhbNua9hE+E7Qv1j+DyZwA=="
            crossorigin="anonymous"
    ></script>
    <script type="text/javascript" charset="utf-8">
        var socket = io();
        socket.on('connect', function () {
            socket.emit('a', {data: 'I\'m connected!'});
        });

        socket.on('init_scenes', function (data) {
            console.log(data);
            const scenes = data.scenes;
            const grid = document.getElementById('grid');

            scenes.forEach(scene => {
                const id = scene[0];
                const name = scene[1];

                // <form>
                const form = document.createElement("form");
                form.action = "/playback";
                form.method = "POST";

                // <button>
                const btn = document.createElement("button");
                btn.className = "scene-button";
                btn.type = "submit";
                btn.name = "start";
                btn.value = id;
                btn.textContent = name;

                form.appendChild(btn);
                grid.appendChild(form);
            });
        });
    </script>

    <div class="scene-grid" id="grid">
    </div>

    <div class="fixed-stop-container">
        <form action="/playback" method="POST">
            <button class="stop-button" type="submit" name="stop" value="stop">STOP</button>
        </form>
    </div>

    <p style="margin-top: 30px">Log:</p>
    {{ log }}

{% endblock %}
