<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>

    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }

        .tabs {
            display: flex;
            border-bottom: 1px solid #ccc;
            margin-bottom: 15px;
        }

        .tab {
            padding: 10px 20px;
            border: 1px solid #ccc;
            border-bottom: none;
            margin-right: 5px;
            background: #f5f5f5;
            text-decoration: none;
            color: black;
        }

        .active {
            background: white;
            font-weight: bold;
        }

        .content {
            border: 1px solid #ccc;
            padding: 15px;
        }
    </style>
</head>

<body>

    <div class="tabs">
        <a href="/playback" class="tab {% if active == 'playback' %}active{% endif %}">Playback</a>
        <a href="/edit" class="tab {% if active == 'edit' %}active{% endif %}">Edit</a>
    </div>

    <div class="content">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
