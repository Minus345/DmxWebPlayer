<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>

    <style>
        :root {
            --bg: #121212;
            --fg: #e5e5e5;
            --tab-bg: #1e1e1e;
            --tab-border: #333;
            --content-bg: #181818;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: var(--bg);
            color: var(--fg);
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid var(--tab-border);
            margin-bottom: 15px;
        }

        .tab {
            padding: 10px 20px;
            border: 1px solid var(--tab-border);
            border-bottom: none;
            margin-right: 5px;
            background: var(--tab-bg);
            text-decoration: none;
            color: var(--fg);
        }

        .tab:hover {
            filter: brightness(1.2);
        }

        .active {
            background: var(--content-bg);
            font-weight: bold;
        }

        .content {
            border: 1px solid var(--tab-border);
            padding: 15px;
            background: var(--content-bg);
        }
    </style>
</head>

<body>

<div class="tabs">
    <a href="/playback" class="tab {% if active == 'playback' %}active{% endif %}">Playback</a>
    <a href="/edit" class="tab {% if active == 'edit' %}active{% endif %}">Edit</a>
</div>

<div class="content">
    {% block content %}{% endblock %}
</div>

</body>
</html>
