<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <title>DmxWebPlayer</title>
</head>
<body>
<p>DmxWebPlayer</p>

<form action="/" method="POST">
    <label for="sceneRecording">New Scene Name:</label>
    <input type="text" id="sceneRecording" name="sceneName">
    <input type="submit" value="Start Recording">
</form>
<form action="/" method="POST">
    <label for="sceneRecordingStop">Currently Recording: {{ curRecording }}</label>
    <button type="submit" name="status" value="stop">Stop Recording</button>
</form>

<br>

{% for scene in sceneList %}
    <form action="/playback" method="POST">
        <label for="scene_name"><em>Scene Name: </em><strong>{{ scene.name }}</strong>
            <em>Running: </em><strong>{{ scene.running }}</strong></label>
        <button type="submit" name="start" value="{{ scene.name }}">Start</button>
        <button type="submit" name="stop" value="{{ scene.name }}">Stop</button>
    </form>
{% endfor %}
</body>
</html>
